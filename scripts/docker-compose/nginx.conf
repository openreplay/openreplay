# Extract sessionid from peerId, it'll be used for sticky sessions.
map $arg_peerId $sessionid {
  default "";
  "~.*-(\d+)(?:-.*|$)" $1;
}

map $http_x_forwarded_for $real_ip {
    ~^(\d+\.\d+\.\d+\.\d+) $1;
    default $remote_addr;
}
map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}
map $http_x_forwarded_proto $origin_proto {
  default $http_x_forwarded_proto;
  '' $scheme;
}

server {
    listen 80;

    # Use Docker DNS, re-resolve every 10s to handle container IP changes
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # Match ingress-nginx defaults used by OpenReplay helm chart
    client_body_buffer_size 512k;
    client_max_body_size 10m;

    proxy_buffer_size 64k;
    proxy_buffers 32 64k;
    proxy_busy_buffers_size 128k;
    proxy_max_temp_file_size 2048m;
    proxy_buffering on;

    proxy_connect_timeout 120s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # Trust upstream/load-balancer forwarded headers
    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;
    real_ip_recursive on;

    # Security headers
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;

    server_tokens off;

    location ~ ^/(mobs|sessions-assets|static|sourcemaps|records|spots)(/|$) {
      set $upstream_minio minio;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Host $http_host;

      proxy_connect_timeout 300;
      # Default is HTTP/1, keepalive is only enabled in HTTP/1.1
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      chunked_transfer_encoding off;

      proxy_pass http://$upstream_minio:9000;
    }

    # Canvas screenshots (must be before /ingest/ catch-all)
    location /ingest/v1/web/images {
      set $upstream_canvases canvases-openreplay;
      proxy_pass http://$upstream_canvases:8080;
    }

    # Mobile image uploads (strip /ingest prefix)
    location /ingest/v1/mobile/images {
      set $upstream_images images-openreplay;
      rewrite ^/ingest/(.*) /$1 break;
      proxy_pass http://$upstream_images:8080;
    }

    location /ingest/ {
      set $upstream_http http-openreplay;
      rewrite ^/ingest/(.*) /$1 break;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
      proxy_set_header X-Forwarded-For $real_ip;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Real-IP $real_ip;
      proxy_set_header Host $host;
      proxy_pass http://$upstream_http:8080;
      proxy_read_timeout 300s;
      proxy_connect_timeout 120s;
      proxy_send_timeout 300s;

      # CORS Headers
      add_header 'Access-Control-Allow-Origin' '*' always;
      add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
      add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Content-Encoding, X-Openreplay-Batch' always;
      add_header 'Access-Control-Expose-Headers' 'Content-Length' always;

      # Handle preflight
      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Content-Encoding, X-Openreplay-Batch' always;
        add_header 'Access-Control-Max-Age' '1728000';
        add_header 'Content-Type' 'text/plain charset=UTF-8';
        add_header 'Content-Length' 0;
        return 204;
      }
    }
    location /integrations/ {
      set $upstream_integrations integrations-openreplay;
      rewrite ^/integrations/(.*) /$1 break;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
      proxy_set_header X-Forwarded-For $real_ip;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Real-IP $real_ip;
      proxy_set_header Host $host;
      proxy_pass http://$upstream_integrations:8080;
      proxy_read_timeout 300s;
      proxy_connect_timeout 120s;
      proxy_send_timeout 300s;

      # CORS Headers
      add_header 'Access-Control-Allow-Origin' '*' always;
      add_header 'Access-Control-Allow-Methods' 'POST, PATCH, DELETE, OPTIONS' always;
      add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Content-Encoding, X-Openreplay-Batch' always;
      add_header 'Access-Control-Expose-Headers' 'Content-Length' always;

      # Handle preflight
      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'POST, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Content-Encoding, X-Openreplay-Batch' always;
        add_header 'Access-Control-Max-Age' '3600';
        add_header 'Content-Type' 'text/plain charset=UTF-8';
        add_header 'Content-Length' 0;
        return 204;
      }
    }

    # New Go-based API (v2) - takes precedence over legacy /api
    location /v2/api/ {
      set $upstream_api api-openreplay;
      rewrite ^/v2/api/(.*) /$1 break;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $origin_proto;
      proxy_set_header X-Forwarded-For $real_ip;
      proxy_set_header X-Real-IP $real_ip;
      proxy_pass http://$upstream_api:8080;
      proxy_read_timeout 300s;
      proxy_connect_timeout 120s;
      proxy_send_timeout 300s;

      # CORS Headers
      add_header 'Access-Control-Allow-Origin' '$http_origin' always;
      add_header 'Access-Control-Allow-Methods' 'POST, GET, PATCH, DELETE, OPTIONS, PUT' always;
      add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Content-Encoding, X-Openreplay-Batch' always;
      add_header 'Access-Control-Expose-Headers' 'Content-Length' always;
      add_header 'Access-Control-Max-Age' '3600' always;
      add_header 'Access-Control-Allow-Credentials' 'true' always;

      # Handle preflight
      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' '$http_origin' always;
        add_header 'Access-Control-Allow-Methods' 'POST, GET, PATCH, DELETE, OPTIONS, PUT' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Content-Encoding, X-Openreplay-Batch' always;
        add_header 'Access-Control-Max-Age' '3600' always;
        add_header 'Content-Length' '0';
        add_header 'Content-Type' 'text/plain';
        return 204;
      }
    }

    # Legacy Python API (chalice)
    location /api/ {
      set $upstream_chalice chalice-openreplay;
      rewrite ^/api/(.*) /$1 break;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $origin_proto;
      proxy_set_header X-Forwarded-For $real_ip;
      proxy_pass http://$upstream_chalice:8000;
      
      # Cache control headers
      add_header Cache-Control "no-store,no-cache" always;
      add_header Pragma "no-cache" always;
    }

    # Spot service (UX testing)
    location /spot/ {
      set $upstream_spot spot-openreplay;
      rewrite ^/spot/(.*) /$1 break;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $origin_proto;
      proxy_set_header X-Forwarded-For $real_ip;
      proxy_set_header X-Real-IP $real_ip;
      proxy_pass http://$upstream_spot:8080;
      proxy_read_timeout 300s;
      proxy_connect_timeout 120s;
      proxy_send_timeout 300s;

      # CORS Headers
      add_header 'Access-Control-Allow-Origin' '*' always;
      add_header 'Access-Control-Allow-Methods' 'POST, PATCH, DELETE, OPTIONS' always;
      add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Content-Encoding, X-Openreplay-Batch' always;
      add_header 'Access-Control-Expose-Headers' 'Content-Length' always;

      # Handle preflight
      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'POST, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Content-Encoding, X-Openreplay-Batch' always;
        add_header 'Access-Control-Max-Age' '3600';
        add_header 'Content-Type' 'text/plain charset=UTF-8';
        add_header 'Content-Length' 0;
        return 204;
      }
    }

    location /ws-assist/ {
      set $upstream_assist assist-openreplay;
      rewrite ^/ws-assist/(.*) /$1 break;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $real_ip;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $origin_proto;
      
      # WebSocket specific
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_connect_timeout 120s;
      
      # Disable buffering for WebSocket
      proxy_buffering off;
      
      # CORS for WebSocket
      add_header 'Access-Control-Allow-Origin' '$http_origin' always;
      add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
      add_header 'Access-Control-Allow-Headers' 'sessionid, Content-Type, Authorization' always;
      add_header 'Access-Control-Max-Age' '1728000' always;
      add_header 'X-Debug-Session-ID' $sessionid always;

      # Handle preflight
      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' '$http_origin' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'sessionid, Content-Type, Authorization' always;
        add_header 'Access-Control-Max-Age' '1728000';
        add_header 'Content-Length' 0;
        add_header 'Content-Type' 'text/plain';
        return 204;
      }
      
      proxy_pass http://$upstream_assist:9001;
    }
    # OpenReplay tracker script proxy
    location /script/ {
      rewrite ^/script/(.*)/openreplay(.*).js$ /$1/openreplay$2.js break;
      proxy_http_version 1.1;
      proxy_ssl_protocols TLSv1.2 TLSv1.3;
      proxy_ssl_server_name on;
      proxy_set_header Host static.openreplay.com;
      proxy_pass https://static.openreplay.com;
      proxy_read_timeout 300s;
      proxy_connect_timeout 120s;
      proxy_send_timeout 300s;
      
      # Enable buffering for static assets
      proxy_buffering on;
      client_max_body_size 8m;
    }

    # Frontend SPA (catch-all)
    location / {
      set $upstream_frontend frontend-openreplay;
      index /index.html;
      rewrite ^((?!.(js|css|png|svg|jpg|woff|woff2)).)*$ /index.html break;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $real_ip;
      proxy_set_header X-Forwarded-Proto $origin_proto;
      proxy_pass http://$upstream_frontend:8080;
      proxy_intercept_errors on; # see http://nginx.org/en/docs/http/ngx_http_proxy_module.html#proxy_intercept_errors
      error_page 404 =200 /index.html;
    }
  }
