# Default values for databases.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: nginx
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}



## Child charts
redis:
  image:
    registry: ghcr.io
    repository: openreplay/valkey
    tag: 8
  enabled: true
  fullnameOverride: redis
  usePassword: false
  cluster:
    enabled: false
  redis:
    resources:
      limits:
        cpu: 250m
        memory: 2Gi
      requests:
        cpu: 100m
        memory: 128Mi

postgresql:
  # postgresqlPassword: asayerPostgres
  fullnameOverride: postgresql
  postgresqlSharedPreloadLibraries: "pgaudit,pg_stat_statements"
  image:
    registry: ghcr.io
    repository: openreplay/postgres
    tag: 17
  enabled: true
  resources:
    limits:
      cpu: 1
      memory: 2Gi
    requests:
      cpu: 250m
      memory: 256Mi

minio:
  # global:
  #  minio:
  #    accessKey: "{{ minio_access_key }}"
  #    secretKey: "{{ minio_secret_key }}"
  image:
    repository: openreplay/minio
    tag: 2025
  fullnameOverride: minio
  enabled: true
  resources:
    limits:
      cpu: 256m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  persistence:
    enabled: true
    size: 5Gi

kafka:
  enabled: true
  fullnameOverride: kafka
  replicaCount: 1
  image:
    repository: docker.redpanda.com/redpandadata/redpanda
    pullPolicy: IfNotPresent
    tag: "latest"

  # Override startup: use redpanda start instead of Kafka env vars
  command:
    - redpanda
    - start
  args:
    - "--smp=1"
    - "--memory=1G"
    - "--overprovisioned"
    - "--default-log-level=info"
    - "--kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092"
    - "--advertise-kafka-addr=internal://$(MY_POD_NAME).kafka-headless.$(POD_NAMESPACE).svc.cluster.local:9092,external://$(MY_POD_NAME).kafka-headless.$(POD_NAMESPACE).svc.cluster.local:19092"
    - "--pandaproxy-addr=internal://0.0.0.0:8082,external://0.0.0.0:18082"
    - "--advertise-pandaproxy-addr=internal://$(MY_POD_NAME).kafka-headless.$(POD_NAMESPACE).svc.cluster.local:8082,external://$(MY_POD_NAME).kafka-headless.$(POD_NAMESPACE).svc.cluster.local:18082"
    - "--rpc-addr=$(MY_POD_NAME).kafka-headless.$(POD_NAMESPACE).svc.cluster.local:33145"
    - "--advertise-rpc-addr=$(MY_POD_NAME).kafka-headless.$(POD_NAMESPACE).svc.cluster.local:33145"

  extraEnvVars:
    - name: POD_NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace

  # Redpanda runs as UID 101 (redpanda user) by default
  podSecurityContext:
    fsGroup: 101
  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 101

  listeners:
    client:
      enabled: true
      port: 9092
      protocol: PLAINTEXT
    internal:
      enabled: false
    ssl:
      enabled: false

  service:
    type: ClusterIP
    client:
      port: 9092
    ssl:
      port: 9094

  persistence:
    enabled: true
    size: 100Gi

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi


# Enterprise dbs
clickhouse:
  image:
    tag: "25.12.3.21-alpine"
  enabled: false

# For enterpriseEdition Only
vault:
  enabled: false
