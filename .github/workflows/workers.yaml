# Ref: https://docs.github.com/en/actions/reference/workflow-syntax-for-github-actions

on:
  workflow_dispatch:
    inputs:
      build_service:
        description: 'Name of a single service to build(in small letters). "all" to build everything'
        required: false
        default: "false"
      skip_security_checks:
        description: "Skip Security checks if there is a unfixable vuln or error. Value: true/false"
        required: false
        default: "false"
  push:
    branches:
      - dev
    paths:
      - backend/**

name: Build and deploy workers

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # We need to diff with old commit
          # to see which workers got changed.
          fetch-depth: 2
          # ref: staging

      - uses: ./.github/composite-actions/update-keys
        with:
          assist_jwt_secret: ${{ secrets.ASSIST_JWT_SECRET }}
          assist_key: ${{ secrets.ASSIST_KEY }}
          domain_name: ${{ secrets.OSS_DOMAIN_NAME }}
          jwt_refresh_secret: ${{ secrets.JWT_REFRESH_SECRET }}
          jwt_secret: ${{ secrets.OSS_JWT_SECRET }}
          jwt_spot_refresh_secret: ${{ secrets.JWT_SPOT_REFRESH_SECRET }}
          jwt_spot_secret: ${{ secrets.JWT_SPOT_SECRET }}
          license_key: ${{ secrets.OSS_LICENSE_KEY }}
          minio_access_key: ${{ secrets.OSS_MINIO_ACCESS_KEY }}
          minio_secret_key: ${{ secrets.OSS_MINIO_SECRET_KEY }}
          pg_password: ${{ secrets.OSS_PG_PASSWORD }}
          registry_url: ${{ secrets.OSS_REGISTRY_URL }}
        name: Update Keys

      - name: Docker login
        run: |
          docker login ${{ secrets.OSS_REGISTRY_URL }} -u ${{ secrets.OSS_DOCKER_USERNAME }} -p "${{ secrets.OSS_REGISTRY_TOKEN }}"

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_REF_NAME//\//-}_${GITHUB_SHA}" >> $GITHUB_ENV

      - uses: azure/k8s-set-context@v5
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.OSS_KUBECONFIG }} # Use content of kubeconfig in secret.
        id: setcontext

      # Caching docker images
      # - uses: satackey/action-docker-layer-caching@v0.0.11
      #   # Ignore the failure of a step and avoid terminating the job.
      #   continue-on-error: true

      - name: Build, tag
        id: build-image
        env:
          DOCKER_REPO: ${{ secrets.OSS_REGISTRY_URL }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          ENVIRONMENT: staging
        run: |
          #
          # TODO: Check the container tags are same, then skip the build and deployment.
          #
          # Build a docker container and push it to Docker Registry so that it can be deployed to Kubernetes cluster.
          #
          # Getting the images to build
          #
          set -xe
          touch /tmp/images_to_build.txt
          skip_security_checks=${{ github.event.inputs.skip_security_checks }}
          tmp_param=${{ github.event.inputs.build_service }}
          build_param=${tmp_param:-'false'}
          case ${build_param} in
            false)
              {
                git diff --name-only HEAD HEAD~1 | grep -E "backend/pkg|backend/internal" | grep -vE ^ee/ | cut -d '/' -f3 | uniq | while read -r pkg_name ; do
                  grep -rl "pkg/$pkg_name" backend/services backend/cmd | cut -d '/' -f3 
                done
              } | awk '!seen[$0]++' > /tmp/images_to_build.txt
            ;;
            all)
              ls backend/cmd > /tmp/images_to_build.txt
              ;;
            *)
              echo ${{github.event.inputs.build_service }} > /tmp/images_to_build.txt
              ;;
          esac

          if [[ $(cat /tmp/images_to_build.txt) == "" ]]; then
            echo "Nothing to build here"
            touch /tmp/nothing-to-build-here
            exit 0
          fi
          #
          # Pushing image to registry
          #
          cd backend
          cat /tmp/images_to_build.txt
          for image in $(cat /tmp/images_to_build.txt);
          do
            echo "Bulding $image"
            PUSH_IMAGE=0 bash -x ./build.sh skip $image
            if [[ "x$skip_security_checks" == "xtrue" ]]; then
              echo "Skipping Security Checks"
            else
              curl -fL https://github.com/aquasecurity/trivy/releases/download/v0.70.0/trivy_0.70.0_Linux-64bit.tar.gz -o /tmp/trivy.tgz && tar -xzf /tmp/trivy.tgz -C ./
              ./trivy image --db-repository ghcr.io/aquasecurity/trivy-db:2 --db-repository public.ecr.aws/aquasecurity/trivy-db:2 --pkg-types os,library --severity "HIGH,CRITICAL" --ignore-unfixed --format json --output /tmp/trivy-$image.json $DOCKER_REPO/$image:$IMAGE_TAG
              # Also print the table to the log for quick triage.
              ./trivy convert --format table --scanners vuln /tmp/trivy-$image.json || true
              count=$(jq '[.Results[]?.Vulnerabilities // [] | length] | add // 0' /tmp/trivy-$image.json)
              if [[ $count -gt 0 ]]; then
                echo "FAILED_SERVICE=$image" >> "$GITHUB_ENV"
                exit 1
              fi
            fi
            docker push $DOCKER_REPO/$image:$IMAGE_TAG 
            echo "::set-output name=image::$DOCKER_REPO/$image:$IMAGE_TAG"
          done

      - name: Deploying to kuberntes
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          #
          # Deploying image to environment.
          #
          set -x
          [[ -f /tmp/nothing-to-build-here ]] && exit 0
          cd scripts/helmcharts/

          set -x
          echo > /tmp/image_override.yaml
          mkdir /tmp/helmcharts
          mv openreplay/charts/{ingress-nginx,connector,assist-api} /tmp/helmcharts/
          ## Update images
          for image in $(cat /tmp/images_to_build.txt);
          do
          mv openreplay/charts/$image /tmp/helmcharts/
          cat <<EOF>>/tmp/image_override.yaml
          ${image}:
            image:
              # We've to strip off the -ee, as helm will append it.
              tag: ${IMAGE_TAG}
          EOF
          done
          ls /tmp/helmcharts
          rm -rf openreplay/charts/*
          ls openreplay/charts
          mv /tmp/helmcharts/* openreplay/charts/
          ls openreplay/charts

          # Deploy command
          helm template openreplay -n app openreplay -f vars.yaml -f /tmp/image_override.yaml --set ingress-nginx.enabled=false --set skipMigration=true | kubectl apply -f -

      - name: Build scan summary
        if: failure() && env.FAILED_SERVICE != ''
        env:
          DOCKER_REPO: ${{ secrets.OSS_REGISTRY_URL }}
        run: |
          set -e
          f=/tmp/trivy-${FAILED_SERVICE}.json
          [[ -f $f ]] || { echo "no trivy report for $FAILED_SERVICE"; exit 0; }

          # GitHub Actions "Summary" tab: full markdown table of every CVE.
          {
            echo "## Trivy — \`$FAILED_SERVICE\` (${DOCKER_REPO}/${FAILED_SERVICE}:${IMAGE_TAG})"
            jq -r '
              [.Results[]?.Vulnerabilities // []] | add // [] |
              if length == 0 then "_No vulnerabilities reported._"
              else
                (group_by(.Severity) | map("**\(.[0].Severity)**: \(length)") | join(" · ")) as $counts |
                "\($counts)\n\n| Severity | CVE | Package | Installed | Fixed |\n|---|---|---|---|---|\n" +
                (sort_by(({"CRITICAL":4,"HIGH":3,"MEDIUM":2,"LOW":1,"UNKNOWN":0}[.Severity] // 0), (.CVSS.nvd.V3Score // 0)) | reverse |
                 map("| \(.Severity) | [\(.VulnerabilityID)](\(.PrimaryURL)) | `\(.PkgName)` | \(.InstalledVersion) | \(.FixedVersion // "—") |") | join("\n"))
              end
            ' "$f"
          } >> "$GITHUB_STEP_SUMMARY"

          # Slack payload: condensed top-10 list, fits under Slack's 4k-char soft limit.
          {
            echo "SLACK_MSG<<SLACK_EOF"
            echo "*Service:* \`$FAILED_SERVICE\`    *Commit:* \`${GITHUB_SHA:0:7}\` by ${GITHUB_ACTOR}"
            jq -r '[.Results[]?.Vulnerabilities // []] | add // [] |
                   if length == 0 then ""
                   else (group_by(.Severity) | map("\(.[0].Severity): \(length)") | join(" · ")) as $c |
                        "*Findings:* \($c)"
                   end' "$f"
            echo "*Top 10:*"
            jq -r '[.Results[]?.Vulnerabilities // []] | add // [] |
                   sort_by(({"CRITICAL":4,"HIGH":3,"MEDIUM":2,"LOW":1,"UNKNOWN":0}[.Severity] // 0), (.CVSS.nvd.V3Score // 0)) | reverse | .[0:10] |
                   map("• `\(.Severity)` \(.VulnerabilityID) — \(.PkgName) \(.InstalledVersion) → \(.FixedVersion // "no fix")") |
                   .[]' "$f"
            echo "SLACK_EOF"
          } >> "$GITHUB_ENV"

      - name: Alert slack
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_CHANNEL: foss
          SLACK_TITLE: "Failed ${{ github.workflow }}${{ env.FAILED_SERVICE && format(' — {0}', env.FAILED_SERVICE) || '' }}"
          SLACK_COLOR: danger
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEB_HOOK }}
          SLACK_USERNAME: "OR Bot"
          SLACK_ICON_EMOJI: ":rotating_light:"
          SLACK_FOOTER: "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run ${{ github.run_id }}>"
          SLACK_MESSAGE: ${{ env.SLACK_MSG || 'Build failed :bomb:' }}
