name: Build MCPB Bundle

on:
  push:
    branches:
      - main
    paths:
      - 'mcp_app/**'
      - 'player/**'
      - '.github/workflows/build-mcpb.yaml'
  pull_request:
    paths:
      - 'mcp_app/**'
      - 'player/**'
      - '.github/workflows/build-mcpb.yaml'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or ref to build from'
        required: false
        default: 'dev'
      tag_name:
        description: 'Release tag to upload the MCPB bundle to (e.g. v1.2.3)'
        required: true

concurrency:
  group: build-mcpb-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-mcpb:
    name: Build MCPB
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag_name }}
    defaults:
      run:
        working-directory: mcp_app
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.ref }}

      - name: Update version from release tag
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        run: |
          version_number=$(echo "${RELEASE_TAG}" | sed 's/^v//')
          echo "Updating manifest version to ${version_number}"
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"${version_number}\"/" manifest.json
          rm -f manifest.json.bak

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn
          cache-dependency-path: mcp_app/yarn.lock

      - name: Install player dependencies
        working-directory: player
        run: yarn install --frozen-lockfile

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build UI, server and pack MCPB
        run: sh pack.sh

      - name: Upload MCPB artifact
        uses: actions/upload-artifact@v4
        with:
          name: openreplay-mcp
          path: mcp_app/openreplay-mcp-desktop.mcpb
          retention-days: 90

      - name: Upload to GitHub Release
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${RELEASE_TAG}" openreplay-mcp-desktop.mcpb --clobber
