# vim: ft=yaml
#
# Bundle variant of the minimal ingest stack: ONE supervised application
# container (all six workers under s6-overlay) instead of six worker services.
# Infra, migration jobs and the caddy CORS proxy are identical to
# docker-compose.yaml.
#
# Run:  COMPOSE_PROFILES=migration docker compose \
#         -f docker-compose.bundle.yaml up -d

services:

  ##############################  INFRA  ##############################

  postgresql:
    image: ghcr.io/openreplay/postgres:${POSTGRES_VERSION}
    container_name: postgres
    volumes:
      - pgdata:/bitnami/postgresql
    networks:
      openreplay-net:
        aliases:
          - postgresql.db.svc.cluster.local
    environment:
      POSTGRESQL_PASSWORD: "${COMMON_PG_PASSWORD}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:${CLICKHOUSE_VERSION}
    container_name: clickhouse
    volumes:
      - clickhouse:/var/lib/clickhouse
    networks:
      openreplay-net:
        aliases:
          - clickhouse-openreplay-clickhouse.db.svc.cluster.local
    environment:
      CLICKHOUSE_USER: "default"
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: ghcr.io/openreplay/valkey:${REDIS_VERSION}
    container_name: redis
    volumes:
      - redisdata:/data
    networks:
      openreplay-net:
        aliases:
          - redis-master.db.svc.cluster.local
    environment:
      ALLOW_EMPTY_PASSWORD: "yes"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: docker.io/rustfs/rustfs:${MINIO_VERSION}
    container_name: minio
    volumes:
      - miniodata:/data
    networks:
      openreplay-net:
        aliases:
          - minio.db.svc.cluster.local
    ports:
      - ${MINIO_CONSOLE_PORT:-9001}:9001
    environment:
      RUSTFS_ACCESS_KEY: ${COMMON_S3_KEY}
      RUSTFS_SECRET_KEY: ${COMMON_S3_SECRET}
      RUSTFS_ADDRESS: "0.0.0.0:9000"
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CONSOLE_ADDRESS: "0.0.0.0:9001"
      RUSTFS_VOLUMES: "/data"
    healthcheck:
      test: ["CMD-SHELL", "curl -so /dev/null http://localhost:9000/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  ###########################  MIGRATIONS  ###########################

  fs-permission:
    image: debian:stable-slim
    container_name: fs-permission
    profiles:
      - "migration"
    volumes:
      - miniodata:/mnt/minio
      - pgdata:/mnt/postgres
    entrypoint:
      - /bin/bash
      - -c
      - |
        chown -R 1001:1001 /mnt/postgres
        chown -R 10001:10001 /mnt/minio
    restart: on-failure

  minio-migration:
    image: ghcr.io/openreplay/minio:2025
    container_name: minio-migration
    profiles:
      - "migration"
    depends_on:
      minio:
        condition: service_healthy
      fs-permission:
        condition: service_completed_successfully
    networks:
      - openreplay-net
    volumes:
      - ./migration-files/minio.sh:/tmp/minio.sh
    environment:
      MINIO_HOST: http://minio.db.svc.cluster.local:9000
      MINIO_ACCESS_KEY: ${COMMON_S3_KEY}
      MINIO_SECRET_KEY: ${COMMON_S3_SECRET}
    user: root
    entrypoint:
      - /bin/bash
      - -c
      - |
        until bash -c 'echo > /dev/tcp/minio/9000' 2>/dev/null; do
            echo "Waiting for Minio server to be ready..."
            sleep 1
        done
        bash /tmp/minio.sh init || exit 100

  db-migration:
    image: ghcr.io/openreplay/postgres:${POSTGRES_VERSION}
    container_name: db-migration
    profiles:
      - "migration"
    depends_on:
      postgresql:
        condition: service_healthy
      minio-migration:
        condition: service_completed_successfully
    networks:
      - openreplay-net
    volumes:
      - ./migration-files/init_pg_schema.sql:/tmp/init_schema.sql
    environment:
      PGHOST: postgresql
      PGPORT: 5432
      PGDATABASE: postgres
      PGUSER: postgres
      PGPASSWORD: ${COMMON_PG_PASSWORD}
    entrypoint:
      - /bin/bash
      - -c
      - |
        until psql -c '\q'; do
        echo "PostgreSQL is unavailable - sleeping"
        sleep 1
        done
        echo "PostgreSQL is up - executing command"
        psql -v ON_ERROR_STOP=1 -f /tmp/init_schema.sql

  clickhouse-migration:
    image: clickhouse/clickhouse-server:${CLICKHOUSE_VERSION}
    container_name: clickhouse-migration
    profiles:
      - "migration"
    depends_on:
      clickhouse:
        condition: service_healthy
      minio-migration:
        condition: service_completed_successfully
    networks:
      - openreplay-net
    volumes:
      - ./migration-files/init_ch_schema.sql:/tmp/init_schema.sql
    environment:
      CH_HOST: "clickhouse-openreplay-clickhouse.db.svc.cluster.local"
      CH_PORT: "9000"
      CH_PORT_HTTP: "8123"
      CH_USERNAME: "default"
      CH_PASSWORD: ""
    entrypoint:
      - /bin/bash
      - -c
      - |
        until nc -z -v -w30 clickhouse-openreplay-clickhouse.db.svc.cluster.local 9000; do
            echo "Waiting for ClickHouse server to be ready..."
            sleep 1
        done
        echo "clickhouse is up - executing command"
        clickhouse-client -h clickhouse-openreplay-clickhouse.db.svc.cluster.local --user default --port 9000 --multiquery < /tmp/init_schema.sql || true

  ###############################  PROXY  ###############################

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    networks:
      - openreplay-net
    ports:
      - ${INGEST_PORT:-8095}:8095
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - openreplay
    restart: unless-stopped

  ###########################  APPLICATION  ###########################

  # One supervised container running all six workers under s6-overlay.
  # Aliased as `http` so the Caddyfile's `reverse_proxy http:8080` is unchanged.
  openreplay:
    image: ${BUNDLE_IMAGE:-openreplay-min-bundle:local}
    container_name: openreplay
    domainname: app.svc.cluster.local
    networks:
      openreplay-net:
        aliases:
          - http
          - http-openreplay
          - http-openreplay.app.svc.cluster.local
    ports:
      - ${HTTP_PORT:-8090}:8080
    volumes:
      # envsubst'd per-worker env files; build-envdirs.sh turns each into an
      # s6 envdir at start so workers keep isolated env (e.g. BUCKET_NAME).
      - ./docker-envs:/work/docker-envs:ro
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  clickhouse:
  redisdata:
  miniodata:

networks:
  openreplay-net:
